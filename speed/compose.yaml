x-warnings: # A block to avoid repeating the same warnings.
  - ${DOMAIN_NAME:?DOMAIN_NAME must be set}
  - ${NIC_ACCESSIBLE:?NIC_ACCESSIBLE must be set}

services:
  speedtest:
    restart: unless-stopped
    container_name: openspeedtest
    image: openspeedtest/latest
    networks:
      - caddy
    labels:
      caddy: speed.$DOMAIN_NAME
      caddy.reverse_proxy: "{{upstreams 3000}}"
      pihole.custom-record: '[["speed.$DOMAIN_NAME", "iface:$NIC_ACCESSIBLE"]]'

networks:
  caddy:
    external: true
